<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <link rel="icon" type="image/png" href="assets/images/logo.png">
</head>
<body>
    <section class="tela-acesso">
    <div class="bloco-interacao">
        <div class="card-acesso">
            <h1 class="titulo-balmy">CRIE SUA CONTA</h1>
            
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text" placeholder="Nome completo">
            </div>

            <div class="input-group">
                <label>E-mail</label>
                <input type="email" placeholder="nome@email.com">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" placeholder="Mínimo 8 caracteres">
            </div>

            <div class="input-group">
                <label>Confirmar Senha</label>
                <input type="password" placeholder="Repita a senha">
            </div>

            <button class="btn-preto">Criar Conta</button>
        </div>
    </div>

    <div class="bloco-arte">
        <img src="assets/images/img-cadastro.png" alt="Processo Criativo de um rascunho" class="imagem-fundo">
    </div>
</section>
    
</body>
</html>
